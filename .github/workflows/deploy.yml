name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm build

      # SPA fallback for unknown paths. Serves the app, but with HTTP 404 —
      # fine for humans, not for crawlers that check the status code.
      - run: cp dist/index.html dist/404.html

      # Real 200 responses for the routes external validators fetch (Meta app
      # settings, App Store / Play console). GitHub Pages serves `<name>.html`
      # for an extension-less `/<name>` request; React Router takes over from
      # there, so the copied index.html renders the right page.
      - name: Emit static entry points for SPA routes
        run: |
          for route in terms privacy delete-account; do
            cp dist/index.html "dist/$route.html"
          done

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
