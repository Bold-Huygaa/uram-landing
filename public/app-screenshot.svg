<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 660" width="320" height="660" fill="none">
  <defs>
    <linearGradient id="feed" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4c1d95"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <clipPath id="screen"><rect x="16" y="16" width="288" height="628" rx="38"/></clipPath>
  </defs>

  <!-- phone body -->
  <rect x="4" y="4" width="312" height="652" rx="52" fill="#0b0b12"/>
  <rect x="8" y="8" width="304" height="644" rx="48" fill="#1a1a26"/>

  <g clip-path="url(#screen)">
    <!-- video background -->
    <rect x="16" y="16" width="288" height="628" fill="url(#feed)"/>
    <circle cx="160" cy="250" r="120" fill="#ffffff" opacity="0.06"/>
    <circle cx="60" cy="500" r="90" fill="#ffffff" opacity="0.05"/>

    <!-- play button -->
    <circle cx="160" cy="300" r="34" fill="#ffffff" opacity="0.9"/>
    <path d="M152 286l20 14-20 14v-28z" fill="#7c3aed"/>

    <!-- right action rail -->
    <g fill="#ffffff">
      <circle cx="278" cy="430" r="16" opacity="0.95"/>
      <path d="M278 424c-3-4-9-2-9 3 0 4 9 9 9 9s9-5 9-9c0-5-6-7-9-3z" fill="#7c3aed"/>
      <text x="278" y="460" font-family="Arial" font-size="9" text-anchor="middle">12k</text>

      <circle cx="278" cy="486" r="16" opacity="0.95"/>
      <path d="M271 480h14v9h-7l-4 4v-4h-3z" fill="#7c3aed"/>
      <text x="278" y="516" font-family="Arial" font-size="9" text-anchor="middle">340</text>

      <circle cx="278" cy="542" r="16" opacity="0.95"/>
      <path d="M273 536l11 6-11 6v-12z" fill="#7c3aed"/>
      <text x="278" y="572" font-family="Arial" font-size="9" text-anchor="middle">Share</text>
    </g>

    <!-- caption -->
    <g fill="#ffffff" font-family="Arial">
      <circle cx="42" cy="556" r="14" opacity="0.95"/>
      <text x="64" y="552" font-size="13" font-weight="bold">@creator</text>
      <text x="32" y="582" font-size="11" opacity="0.9">Богино видеогоо хуваалцаарай ✨</text>
      <text x="32" y="600" font-size="11" opacity="0.7">#uram</text>
    </g>

    <!-- top bar -->
    <g fill="#ffffff" font-family="Arial" font-weight="bold">
      <text x="80" y="56" font-size="13" opacity="0.6">Дагасан</text>
      <text x="160" y="56" font-size="14" text-anchor="middle">Танд зориулав</text>
      <rect x="120" y="62" width="80" height="3" rx="1.5" opacity="0.9"/>
    </g>

    <!-- notch -->
    <rect x="120" y="22" width="80" height="20" rx="10" fill="#0b0b12"/>
  </g>
</svg>
